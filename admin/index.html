<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Divine Dogs</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
.admin-placeholder{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--espresso);
  color:var(--butter);
  text-align:center;
  padding:2rem;
}
.admin-placeholder .box{
  max-width:560px;
  background:rgba(255,237,202,.06);
  border:1px solid rgba(255,237,202,.2);
  border-radius:20px;
  padding:3rem 2.5rem;
  backdrop-filter:blur(20px);
}
.admin-placeholder h1{
  font-family:var(--font-display);
  font-weight:300;
  font-size:2.5rem;
  margin-bottom:1rem;
  letter-spacing:-.03em;
}
.admin-placeholder h1 em{
  font-style:italic;
  color:var(--accent-warm);
  font-weight:500;
}
.admin-placeholder p{
  color:rgba(255,237,202,.7);
  margin-bottom:1.5rem;
  line-height:1.6;
}
.admin-placeholder a{
  color:var(--accent-warm);
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="admin-placeholder">
  <div class="box">
    <h1>Panneau <em>d'administration</em></h1>
    <p>Cette page est réservée à l'administration du site Divine Dogs. Le panneau de gestion (authentification, modification des contenus via data.json, gestion des avis et des tarifs) sera développé prochainement.</p>
    <p><a href="../">← Retour au site</a></p>
  </div>
</div>

</body>
</html>
